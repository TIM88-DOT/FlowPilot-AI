name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Least privilege — jobs only read the repo
permissions:
  contents: read

# Cancel superseded runs on the same ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "8.0.x"
  NODE_VERSION: "20"

jobs:
  backend:
    name: Backend (build + test)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: flowpilot_test
          POSTGRES_USER: flowpilot
          POSTGRES_PASSWORD: flowpilot_dev_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flowpilot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore FlowPilot.sln

      - name: Build
        run: dotnet build FlowPilot.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test FlowPilot.sln --no-build --configuration Release --logger "trx;LogFileName=test-results.trx"
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=flowpilot_test;Username=flowpilot;Password=flowpilot_dev_pass"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: "**/*.trx"

  frontend:
    name: Frontend (build + type-check)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: src/FlowPilot.Web/package-lock.json

      - name: Install dependencies
        working-directory: src/FlowPilot.Web
        run: npm ci

      - name: Lint
        working-directory: src/FlowPilot.Web
        run: npm run lint

      - name: Build (includes TypeScript check)
        working-directory: src/FlowPilot.Web
        run: npm run build
